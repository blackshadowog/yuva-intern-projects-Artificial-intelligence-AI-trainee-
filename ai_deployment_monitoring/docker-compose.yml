version: "3.9"

services:
  iris-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: iris-prediction-api:1.0.0
    container_name: iris_api
    ports:
      - "8000:8000"
    environment:
      - LOG_LEVEL=INFO
      - LOG_DIR=/app/logs
    volumes:
      # Mount a host directory so logs persist outside the container
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    # Resource limits (adjust for production)
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
